<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>Zephira Pharma — Precision Medicine</title> <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/> <style> *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } :root { --cream: #f5f0e8; --deep: #0d1f1a; --green: #1a3d2e; --sage: #4a7c59; --gold: #b8924a; --light: #e8ede6; --text: #2a3628; } html { scroll-behavior: smooth; } body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); overflow-x: hidden; } /* NAV */ nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.4rem 4rem; background: rgba(245,240,232,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(74,124,89,0.15); } .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 600; letter-spacing: 0.04em; color: var(--green); } .nav-logo span { color: var(--gold); } .nav-links { display: flex; gap: 2.5rem; list-style: none; } .nav-links a { text-decoration: none; color: var(--text); font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.3s; } .nav-links a:hover { color: var(--sage); } .nav-cta { background: var(--green); color: var(--cream) !important; padding: 0.55rem 1.4rem; border-radius: 2px; } .nav-cta:hover { background: var(--sage); color: var(--cream) !important; } /* HERO */ .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; padding-top: 80px; overflow: hidden; } .hero-left { display: flex; flex-direction: column; justify-content: center; padding: 6rem 4rem 6rem 6rem; position: relative; } .hero-tag { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--sage); font-weight: 500; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.8rem; } .hero-tag::before { content: ''; display: block; width: 2rem; height: 1px; background: var(--sage); } .hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 5vw, 5rem); font-weight: 300; line-height: 1.1; color: var(--deep); margin-bottom: 1.8rem; } .hero-title em { font-style: italic; color: var(--sage); } .hero-desc { font-size: 1rem; line-height: 1.8; color: #5a6b58; max-width: 420px; margin-bottom: 2.8rem; } .hero-btns { display: flex; gap: 1rem; } .btn-primary { background: var(--green); color: var(--cream); padding: 0.9rem 2.2rem; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; letter-spacing: 0.08em; text-transform: uppercase; border-radius: 2px; transition: all 0.3s; text-decoration: none; display: inline-block; } .btn-primary:hover { background: var(--sage); transform: translateY(-2px); } .btn-outline { background: transparent; color: var(--green); padding: 0.9rem 2.2rem; border: 1px solid var(--green); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; letter-spacing: 0.08em; text-transform: uppercase; border-radius: 2px; transition: all 0.3s; text-decoration: none; display: inline-block; } .btn-outline:hover { background: var(--green); color: var(--cream); } .hero-right { background: var(--green); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; } .hero-right::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 50%, rgba(74,124,89,0.4) 0%, transparent 70%); } .hero-visual { position: relative; z-index: 1; text-align: center; } .hero-circle { width: 320px; height: 320px; border-radius: 50%; border: 1px solid rgba(184,146,74,0.3); display: flex; align-items: center; justify-content: center; position: relative; animation: pulse-ring 4s ease-in-out infinite; } .hero-circle::before { content: ''; position: absolute; inset: 20px; border-radius: 50%; border: 1px solid rgba(184,146,74,0.2); } .hero-circle::after { content: ''; position: absolute; inset: 40px; border-radius: 50%; border: 1px solid rgba(184,146,74,0.15); } .hero-icon { font-size: 5rem; filter: drop-shadow(0 0 30px rgba(184,146,74,0.3)); } @keyframes pulse-ring { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.04); opacity: 0.8; } } .hero-stat-band { position: absolute; bottom: 0; left: 0; right: 0; display: flex; background: rgba(0,0,0,0.2); backdrop-filter: blur(8px); } .hero-stat { flex: 1; padding: 1.4rem; text-align: center; border-right: 1px solid rgba(255,255,255,0.1); } .hero-stat:last-child { border-right: none; } .hero-stat-num { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--gold); font-weight: 300; } .hero-stat-label { font-size: 0.7rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.2rem; } /* MARQUEE */ .marquee-wrap { background: var(--deep); padding: 1rem 0; overflow: hidden; } .marquee-track { display: flex; gap: 3rem; width: max-content; animation: marquee 20s linear infinite; } .marquee-item { font-size: 0.75rem; color: rgba(245,240,232,0.5); text-transform: uppercase; letter-spacing: 0.15em; white-space: nowrap; } .marquee-dot { color: var(--gold); } @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } } /* SECTION SHARED */ section { padding: 7rem 6rem; } .section-tag { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--sage); font-weight: 500; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.8rem; } .section-tag::before { content: ''; display: block; width: 1.5rem; height: 1px; background: var(--sage); } .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 3.5vw, 3.2rem); font-weight: 300; line-height: 1.2; color: var(--deep); margin-bottom: 1.2rem; } /* ABOUT */ .about { background: var(--light); } .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; align-items: center; margin-top: 3rem; } .about-text p { font-size: 1rem; line-height: 1.9; color: #5a6b58; margin-bottom: 1.2rem; } .about-values { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; } .value-card { background: var(--cream); padding: 1.8rem; border-radius: 4px; border-left: 3px solid var(--gold); } .value-icon { font-size: 1.6rem; margin-bottom: 0.8rem; } .value-title { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 600; color: var(--deep); margin-bottom: 0.4rem; } .value-desc { font-size: 0.82rem; color: #6a7d68; line-height: 1.6; } /* PRODUCTS */ #products { background: var(--cream); } .products-intro { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3.5rem; } .products-intro-text { max-width: 500px; } .products-intro-text p { color: #5a6b58; line-height: 1.8; margin-top: 0.8rem; } .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; } .product-card { background: white; border-radius: 6px; overflow: hidden; border: 1px solid rgba(74,124,89,0.1); transition: all 0.4s cubic-bezier(0.23,1,0.32,1); cursor: pointer; } .product-card:hover { transform: translateY(-8px); box-shadow: 0 30px 60px rgba(13,31,26,0.12); border-color: rgba(74,124,89,0.3); } .product-img { height: 200px; display: flex; align-items: center; justify-content: center; font-size: 4rem; position: relative; overflow: hidden; } .product-img::after { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s; background: rgba(26,61,46,0.08); } .product-card:hover .product-img::after { opacity: 1; } .p1 { background: linear-gradient(135deg, #e8f0e5, #d4e4cf); } .p2 { background: linear-gradient(135deg, #e8e4d4, #ddd4b8); } .p3 { background: linear-gradient(135deg, #d4e0e8, #c4d4e0); } .p4 { background: linear-gradient(135deg, #e8d4d4, #e0c4c4); } .p5 { background: linear-gradient(135deg, #d4e8e4, #c4dcd8); } .p6 { background: linear-gradient(135deg, #e4d4e8, #d8c4e0); } .product-badge { position: absolute; top: 1rem; right: 1rem; background: var(--gold); color: white; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.25rem 0.7rem; border-radius: 2px; font-family: 'DM Sans', sans-serif; } .product-body { padding: 1.8rem; } .product-cat { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--sage); font-weight: 500; margin-bottom: 0.5rem; } .product-name { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; color: var(--deep); margin-bottom: 0.6rem; } .product-desc { font-size: 0.83rem; color: #6a7d68; line-height: 1.7; margin-bottom: 1.4rem; } .product-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 1rem; border-top: 1px solid var(--light); } .product-form { font-size: 0.75rem; color: #8a9d88; letter-spacing: 0.05em; } .product-link { font-size: 0.78rem; color: var(--sage); text-decoration: none; font-weight: 500; letter-spacing: 0.05em; display: flex; align-items: center; gap: 0.3rem; transition: gap 0.2s; } .product-link:hover { gap: 0.6rem; } /* PIPELINE */ .pipeline { background: var(--deep); color: var(--cream); } .pipeline .section-title { color: var(--cream); } .pipeline .section-tag { color: var(--gold); } .pipeline .section-tag::before { background: var(--gold); } .pipeline-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; margin-top: 4rem; border: 1px solid rgba(255,255,255,0.08); } .pipeline-stage { padding: 2.5rem 2rem; border-right: 1px solid rgba(255,255,255,0.08); position: relative; } .pipeline-stage:last-child { border-right: none; } .pipeline-num { font-family: 'Cormorant Garamond', serif; font-size: 3rem; color: rgba(184,146,74,0.2); font-weight: 300; line-height: 1; margin-bottom: 1rem; } .pipeline-name { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--gold); margin-bottom: 1rem; } .pipeline-products { display: flex; flex-direction: column; gap: 0.6rem; } .pipeline-product { background: rgba(255,255,255,0.05); padding: 0.7rem 1rem; border-radius: 2px; font-size: 0.82rem; color: rgba(245,240,232,0.7); border-left: 2px solid transparent; transition: all 0.3s; } .pipeline-product:hover { border-left-color: var(--gold); background: rgba(184,146,74,0.08); color: var(--cream); } .pipeline-product.active { border-left-color: var(--sage); } /* CONTACT */ .contact { background: var(--light); } .contact-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 6rem; align-items: start; margin-top: 3rem; } .contact-info { display: flex; flex-direction: column; gap: 2rem; } .contact-item { display: flex; gap: 1.2rem; align-items: flex-start; } .contact-icon { width: 44px; height: 44px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; } .contact-item-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--sage); margin-bottom: 0.3rem; } .contact-item-text { font-size: 0.9rem; color: var(--text); line-height: 1.6; } .contact-form { display: flex; flex-direction: column; gap: 1.2rem; } .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; } .form-group { display: flex; flex-direction: column; gap: 0.4rem; } .form-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--sage); font-weight: 500; } .form-input, .form-textarea { background: white; border: 1px solid rgba(74,124,89,0.2); padding: 0.8rem 1rem; border-radius: 3px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--text); outline: none; transition: border-color 0.3s; } .form-input:focus, .form-textarea:focus { border-color: var(--sage); } .form-textarea { resize: vertical; min-height: 120px; } /* FOOTER */ footer { background: var(--deep); color: rgba(245,240,232,0.6); padding: 3rem 6rem; display: flex; align-items: center; justify-content: space-between; } .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--cream); font-weight: 600; } .footer-logo span { color: var(--gold); } .footer-copy { font-size: 0.78rem; } .footer-links { display: flex; gap: 2rem; } .footer-links a { font-size: 0.78rem; color: rgba(245,240,232,0.4); text-decoration: none; transition: color 0.3s; } .footer-links a:hover { color: var(--gold); } /* ANIMATIONS */ .fade-up { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; } .fade-up.visible { opacity: 1; transform: translateY(0); } @media (max-width: 900px) { nav { padding: 1.2rem 2rem; } .nav-links { display: none; } .hero { grid-template-columns: 1fr; } .hero-right { min-height: 350px; } .hero-left { padding: 4rem 2rem; } section { padding: 5rem 2rem; } .about-grid, .contact-grid { grid-template-columns: 1fr; gap: 3rem; } .products-grid { grid-template-columns: 1fr 1fr; } .pipeline-grid { grid-template-columns: 1fr 1fr; } footer { flex-direction: column; gap: 1.5rem; text-align: center; padding: 2.5rem 2rem; } .products-intro { flex-direction: column; align-items: flex-start; gap: 1rem; } } </style> </head> <body> <!-- NAV --> <nav> <div class="nav-logo">Zephira<span>.</span></div> <ul class="nav-links"> <li><a href="#about">About</a></li> <li><a href="#products">Products</a></li> <li><a href="#pipeline">Pipeline</a></li> <li><a
